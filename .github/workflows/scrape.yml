name: Scrape No Starch catalog

on:
  workflow_dispatch:
  schedule:
    - cron: "17 9 * * 1"

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: oven-sh/setup-bun@v2
      - uses: astral-sh/setup-uv@v6
      - name: Install system PDF tools
        run: sudo apt-get update && sudo apt-get install -y poppler-utils
      - name: Install Bun dependencies
        run: bun install --frozen-lockfile
      - name: Scrape current catalog
        run: bun run scrape
      - name: Extract PDF text
        run: bun run extract-pdfs
      - name: Build current catalog database
        run: bun run build-db
      - name: Commit changed catalog artifacts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data ':!data/history.db'
          if git diff --cached --quiet; then
            echo "No catalog changes"
          else
            git commit -m "Update No Starch catalog snapshot"
            git push
          fi
      - name: Build git-history database
        run: bun run history-db
      - name: Commit changed history database
        run: |
          git add data/history.db
          if git diff --cached --quiet; then
            echo "No history database changes"
          else
            git commit -m "Update catalog history database"
            git push
          fi
